name: Deploy Web

on:
  push:
    branches: [main]

# Production deploy of apps/web to Vercel (app.leados.app). Gated on CI green.
# Secrets cannot be used in a job-level `if:`; map the token to env and gate at step level.
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json `packageManager` (no `version:` here).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: ${{ env.VERCEL_TOKEN != '' }}
      - name: Deploy to Vercel production
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
