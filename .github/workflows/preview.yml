name: Preview Deploy

on:
  pull_request:

# Spins a Vercel preview for apps/web and (where configured) an ephemeral API preview, so
# the browser → BFF → API path can be validated per PR (SPRINT_1_EXECUTION_PLAN §5.2).
# Secrets cannot be used in a job-level `if:`; map the token to env and gate at step level.
jobs:
  preview-web:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json `packageManager` (no `version:` here).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: ${{ env.VERCEL_TOKEN != '' }}
      - name: Deploy Vercel preview
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
