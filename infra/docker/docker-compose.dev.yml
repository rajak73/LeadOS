# Local development infra: Postgres + Redis. Used for local dev and (mirrored) by CI's
# integration job so the service-gated tests (queue round-trip, deep health) execute.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leados
      POSTGRES_PASSWORD: leados
      POSTGRES_DB: leados
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leados']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - leados_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  leados_pg:
